name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm install

      - run: npm run build

      - name: Package plugin
        run: |
          mkdir pen
          cp build/main.js build/manifest.json build/styles.css pen/
          zip -r pen.zip pen

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pen.zip
            build/main.js
            build/manifest.json
            build/styles.css
